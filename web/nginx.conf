# Web konteyner nginx'i: SPA statikasi + /api -> FastAPI (compose'dagi "api"
# xizmati). SPA VITE_API_BASE_URL=/api bilan build qilinadi (web/.env.production),
# shuning uchun brauzer so'rovlari shu proxy orqali o'tadi — CORS ham kerak emas.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    # /api/foo -> http://api:8000/foo (trailing slash prefiksni kesadi)
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Eski verifix/Django-admin havolalari — yangi sahifalarga (dev bilan mos)
    location /verifix { return 302 /check-in; }
    location /admin   { return 302 /attendance; }

    # Vite content-hash'li assetlar — uzoq kesh
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
