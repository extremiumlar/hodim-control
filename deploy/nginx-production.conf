# PRODUCTION host nginx (konteynerlardan TASHQARIDA, serverning o'zida).
#
#   internet --HTTPS--> host nginx (shu fayl) --HTTP--> 127.0.0.1:8080 (web konteyner)
#                                                        └─ /api -> api konteyner (ichkarida)
#
# MUHIM: kamera (Face ID) va GPS faqat HTTPS'da ishlaydi — TLS'siz check-in
# umuman ishlamaydi. Sertifikat: `sudo certbot --nginx -d SIZNING_DOMEN`
# (certbot ssl_certificate satrlarini o'zi qo'shadi/yangilaydi).
#
# O'rnatish:
#   sudo cp deploy/nginx-production.conf /etc/nginx/sites-available/hodimlar
#   sudo ln -s /etc/nginx/sites-available/hodimlar /etc/nginx/sites-enabled/
#   "SIZNING_DOMEN" ni haqiqiy domenga almashtiring
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d SIZNING_DOMEN

server {
    listen 80;
    server_name SIZNING_DOMEN;

    # certbot HTTP-01 challenge uchun ham shu server ishlatiladi;
    # certbot o'zi 443 blok va redirect qo'shadi.

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
