# Yagona tizim reverse-proxy (gateway).
#
#   http://<domen>/        -> hodimlar_tizimi web (SPA; xodim /check-in, rahbar panel)
#   http://<domen>/api/    -> FastAPI backend (agar SPA nisbiy /api ishlatilsa)
#
# verifix (hodim_crm) 2026-07-14 da yagona backendga birlashtirildi: davomat endi
# asosiy ilova ichida (/check-in, /attendance, /offices). Eski /verifix va /admin
# havolalari mosligini saqlash uchun quyida redirect berilgan.
#
# Portlar (lokal): 5173 web (Vite), 8000 API (FastAPI).
#
# DIQQAT: kamera (Face ID) va GPS faqat XAVFSIZ originda ishlaydi — bu server
# jonli ishlatilsa 443/SSL sertifikat qo'shish shart (masalan certbot);
# oddiy http:80 orqali telefonda check-in ishlamaydi.

upstream hodimlar_web { server 127.0.0.1:5173; }
upstream hodimlar_api { server 127.0.0.1:8000; }

server {
    listen 80;
    server_name _;  # haqiqiy domen bilan almashtiring

    client_max_body_size 20m;

    # Eski verifix/Django-admin havolalari — yangi sahifalarga
    location /verifix { return 302 /check-in; }
    location /admin   { return 302 /attendance; }

    # hodimlar_tizimi API — SPA nisbiy /api bilan sozlangan
    # (web/.env -> VITE_API_BASE_URL=/api). Trailing slash: /api/foo -> /foo.
    location /api/ {
        proxy_pass http://hodimlar_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://hodimlar_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
