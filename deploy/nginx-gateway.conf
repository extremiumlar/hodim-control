# Bitta domen ostida ikki ilovani birlashtiruvchi reverse-proxy (gateway).
#
#   http://<domen>/          -> hodimlar_tizimi (asosiy: Vite SPA + FastAPI)
#   http://<domen>/verifix/  -> hodim_crm (Face ID davomat: Next.js + Django)
#
# Misol: nuriddin_building.uz  -> hodimlar tizimi
#        nuriddin_building.uz/verifix -> hodim_crm (verifix)
#
# Portlar (lokal dev serverlari):
#   5173  hodimlar_tizimi web (Vite)
#   8000  hodimlar_tizimi API (FastAPI)     <- band, shuning uchun verifix Django 8002da
#   3000  verifix frontend (Next.js, basePath=/verifix)
#   8002  verifix backend (Django)          <- Next.js server-side proxy qiladi
#
# ESLATMA: verifix Django'ga to'g'ridan-to'g'ri emas, Next.js orqali (/verifix/django-api)
# boriladi, shuning uchun bu yerda 8002 uchun alohida location shart emas.

upstream hodimlar_web { server 127.0.0.1:5173; }
upstream hodimlar_api { server 127.0.0.1:8000; }
upstream verifix_web  { server 127.0.0.1:3000; }

server {
    listen 80;
    server_name _;  # haqiqiy domen bilan almashtiring (masalan nuriddin_building.uz)

    client_max_body_size 20m;  # yuz rasmlari/yuklamalar uchun

    # --- verifix (hodim_crm) — /verifix ostida ---
    location /verifix {
        proxy_pass http://verifix_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Next.js HMR/WebSocket (dev) uchun
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- hodimlar_tizimi API (agar SPA nisbiy /api ishlatilsa) ---
    # Hozircha hodimlar web to'g'ridan-to'g'ri http://localhost:8000 chaqiradi;
    # yagona domenda ishlatishda VITE_API_BASE_URL=/api qilib, shuni yoqing:
    # location /api/ {
    #     proxy_pass http://hodimlar_api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # }

    # --- hodimlar_tizimi (asosiy) — qolgan hamma narsa ---
    location / {
        proxy_pass http://hodimlar_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
